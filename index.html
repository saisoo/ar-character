<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AR 캐릭터 인식 · 그래픽디자인과</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
  :root{
    --bg: #05050a;
    --panel: #0d0d16;
    --panel-border: #1c1c2b;
    --cyan: #00eaff;
    --magenta: #ff2f92;
    --lime: #b6ff3c;
    --ink: #eef2f7;
    --muted: #7d879c;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;      /* iOS/안드로이드에서 화면을 당겼을 때 스크롤/새로고침되는 것 방지 */
    touch-action: manipulation;     /* 더블탭 확대, 핀치 줌 등 제스처 무력화 */
    -webkit-user-select: none; user-select: none;   /* 길게 눌러서 텍스트/이미지 선택되는 것 방지 */
    -webkit-touch-callout: none;    /* iOS에서 길게 눌렀을 때 뜨는 메뉴 방지 */
  }

  /* ---------- 배경 그리드 (AR 세계관 연출) ---------- */
  .grid-bg{
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,234,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,234,255,0.06) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(circle at center, black 40%, transparent 85%);
  }

  /* ---------- 헤더 ---------- */
  header{
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(18px + env(safe-area-inset-top)) calc(28px + env(safe-area-inset-right)) 18px calc(28px + env(safe-area-inset-left));
    pointer-events: none;
    flex-wrap: wrap;
    gap: 8px;
  }
  .brand{
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--cyan);
    display: flex; align-items: center; gap: 10px;
    text-shadow: 0 0 14px rgba(0,234,255,0.5);
  }
  .brand .dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--lime);
    box-shadow: 0 0 10px var(--lime);
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0.25} }

  .brand small{
    font-family: 'Pretendard', sans-serif;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0;
    font-size: 12px;
  }

  /* ---------- 무대 (카메라 + 캔버스) ---------- */
  .stage-wrap{
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }
  .cam-frame{
    position: relative;
    --ar: 1.7778; /* 카메라 스트림의 가로/세로 비율 - JS에서 실제 값으로 갱신됨 */
    /* 화면 회전/크기 변경에 반응형으로 자동 대응(가로가 넉넉하면 세로 기준, 세로가 넉넉하면 가로 기준) */
    width: min(100vw, 100vh * var(--ar));   /* dvh 미지원 브라우저를 위한 폴백 */
    height: min(100vh, 100vw / var(--ar));
    width: min(100vw, 100dvh * var(--ar));
    height: min(100dvh, 100vw / var(--ar));
    transform: scaleX(-1); /* 전면 카메라 거울 모드(후면 카메라 사용 시 JS에서 해제) */
  }
  .cam-frame.no-mirror{ transform: scaleX(1); }
  video, canvas{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  video{ background: #000; }

  /* ---------- 안내 문구 ---------- */
  .guide{
    position: absolute; left: 50%; bottom: 9%;
    transform: translateX(-50%);
    z-index: 15;
    text-align: center;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .guide .big{
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 3vw, 34px);
    letter-spacing: 0.04em;
    color: var(--ink);
    text-shadow: 0 0 20px rgba(0,234,255,0.35);
  }
  .guide .small{
    margin-top: 8px;
    font-size: clamp(12px, 1.3vw, 16px);
    color: var(--muted);
  }

  /* ---------- 상태 뱃지 ---------- */
  .status-badge{
    position: fixed;
    top: calc(20px + env(safe-area-inset-top));
    right: calc(28px + env(safe-area-inset-right));
    z-index: 20;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: rgba(13,13,22,0.7);
    border: 1px solid var(--panel-border);
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    backdrop-filter: blur(6px);
  }
  .status-badge .led{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
  }
  .status-badge.locked{ color: var(--lime); border-color: rgba(182,255,60,0.3); }
  .status-badge.locked .led{ background: var(--lime); box-shadow: 0 0 8px var(--lime); }

  /* ---------- 컨트롤 패널 (교사용) ---------- */
  .panel-toggle{
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    right: calc(20px + env(safe-area-inset-right));
    z-index: 30;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s;
  }
  .panel-toggle:hover{ color: var(--cyan); border-color: var(--cyan); }

  .panel{
    position: fixed;
    bottom: calc(78px + env(safe-area-inset-bottom));
    right: calc(20px + env(safe-area-inset-right));
    left: auto;
    z-index: 30;
    width: 280px;
    max-width: calc(100vw - 32px);
    max-height: calc(100dvh - 120px);
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 18px;
    transform: translateY(12px);
    opacity: 0;
    pointer-events: none;
    transition: 0.22s ease;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .panel.open{
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .panel h3{
    margin: 0 0 4px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--cyan);
  }
  .panel p.hint{
    margin: 0 0 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .upload-btn{
    display: flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: 1px dashed rgba(0,234,255,0.4);
    background: rgba(0,234,255,0.06);
    color: var(--cyan);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  .upload-btn:hover{ background: rgba(0,234,255,0.12); }
  input[type=file]{ display:none; }

  .char-list{
    margin-top: 12px;
    max-height: 168px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 6px;
  }
  .char-item{
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 6px 8px;
  }
  .char-item img{
    width: 32px; height: 32px; object-fit: contain;
    background: #000;
    border-radius: 6px;
    border: 1px solid var(--panel-border);
    flex-shrink: 0;
  }
  .char-item span{
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .char-item button{
    flex-shrink: 0;
    width: 30px; height: 30px;   /* 터치로 누르기 편하도록 확대 */
    border-radius: 50%;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--muted);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
  }
  .char-item button:hover{ color: var(--magenta); border-color: var(--magenta); }
  .char-count-hint{
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .panel-row{ display:flex; gap:8px; margin-top: 10px; }
  .mini-btn{
    flex:1;
    padding: 12px 0;
    min-height: 40px;
    border-radius: 8px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }
  .mini-btn:hover{ color: var(--ink); border-color: var(--muted); }

  .error-box{
    position: fixed; inset:0; z-index: 50;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(5,5,10,0.92);
    text-align: center; padding: 40px;
  }
  .error-box.show{ display:flex; }
  .error-box .msg{ max-width: 480px; }
  .error-box h2{ font-family:'Orbitron',sans-serif; color: var(--magenta); }
  .error-box p{ color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<header>
  <div class="brand">
    <span class="dot"></span>
    AR CHARACTER SCANNER <small>덕영고등학교 · 그래픽디자인과 XR</small>
  </div>
</header>

<div class="status-badge" id="statusBadge">
  <span class="led"></span>
  <span id="statusText">카메라 준비 중</span>
</div>

<div class="stage-wrap">
  <div class="cam-frame" id="camFrame">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
</div>

<div class="guide" id="guide">
  <div class="big">카메라 앞에 서 보세요</div>
  <div class="small">캐릭터를 손으로 잡아 던지거나, 때리거나, 아래서 방방 튕겨보세요</div>
</div>

<button class="panel-toggle" id="panelToggle" title="설정">⚙</button>
<div class="panel" id="panel">
  <h3>캐릭터 업로드</h3>
  <p class="hint">배경을 투명하게 제거한 PNG 파일을 올려주세요. 여러 장을 한 번에 선택하거나, 여러 번 나눠서 추가할 수 있어요.</p>
  <label class="upload-btn" for="fileInput">＋ 캐릭터 추가</label>
  <input type="file" id="fileInput" accept="image/png, image/webp, image/gif" multiple>
  <div class="char-list" id="charList"></div>
  <div class="char-count-hint" id="charCountHint">등록된 캐릭터 0개 (최대 6개)</div>
  <div class="panel-row">
    <button class="mini-btn" id="resetBtn">전체 삭제</button>
    <button class="mini-btn" id="fullscreenBtn">전체화면</button>
  </div>
  <div class="panel-row">
    <button class="mini-btn" id="switchCameraBtn">카메라 전환</button>
  </div>
</div>

<div class="error-box" id="errorBox">
  <div class="msg">
    <h2>카메라를 시작할 수 없어요</h2>
    <p id="errorMsg">브라우저의 카메라 권한을 확인해주세요. 이 페이지가 https 주소(예: GitHub Pages)로 열려 있어야 카메라를 사용할 수 있습니다.</p>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const camFrame = document.getElementById('camFrame');
const guide = document.getElementById('guide');
const statusBadge = document.getElementById('statusBadge');
const statusText = document.getElementById('statusText');
const panel = document.getElementById('panel');
const panelToggle = document.getElementById('panelToggle');
const fileInput = document.getElementById('fileInput');
const charList = document.getElementById('charList');
const charCountHint = document.getElementById('charCountHint');
const resetBtn = document.getElementById('resetBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const switchCameraBtn = document.getElementById('switchCameraBtn');
const errorBox = document.getElementById('errorBox');
const errorMsg = document.getElementById('errorMsg');

const MAX_CHARACTERS = 6;
let characters = [];        // 등록된 모든 캐릭터(공처럼 물리적으로 움직이는 개체들)
let nextCharId = 1;

let currentFacingMode = 'user'; // 'user'(전면) | 'environment'(후면) - 태블릿을 후면 카메라로 거치하는 경우 대비
let mirrorSign = -1;             // 전면 카메라는 거울모드(-1), 후면 카메라는 좌우반전 없음(1)
let currentStream = null;

let currentBox = null;      // 화면에 실제로 그려지는(보간된) 얼굴 박스 - 캐릭터 위치의 기준이 아니라
                             // 스캔 브라켓 표시 + 캐릭터 최초 등장 위치 참고용으로만 사용
let lastSeenAt = 0;         // 마지막으로 얼굴을 본 시각
let lockedFrames = 0;       // 연속으로 안정적으로 인식된 프레임 수
let isLocked = false;
const LOST_TIMEOUT = 1400;  // 이 시간(ms) 동안 못 찾으면 "인식 끊김" 처리

// ---- 손 인식 상태 (양손, 각각 독립적으로 추적) ----
let handLandmarker = null;
const handTracks = [
  { present: false, smX: 0, smY: 0, vx: 0, vy: 0, lastSeenAt: 0 },
  { present: false, smX: 0, smY: 0, vx: 0, vy: 0, lastSeenAt: 0 },
];

// ---- 손과의 상호작용 중재(손이 두 개이므로 손마다 하나씩, 최대 2개 동시에 잡기 가능) ----
let grabByHand = [null, null];      // 각 손이 잡고 있는 캐릭터 id
let jumpCooldownUntil = [0, 0];     // 손마다 따로 점프 쿨다운
let handYHistories = [[], []];      // 손마다 따로 상하 움직임 기록
let hitEffects = [];                // [{ x, y, t }] 때리기 이펙트 표시용(여러 개 동시 가능)

const GRAB_SPEED_FACTOR = 0.055;   // 이보다 손이 느리게 머물러야 "캐치" 판정 시작
const GRAB_DWELL_FRAMES = 14;      // 캐치까지 필요한 시간(프레임 환산, 약 0.23초)
const SIZE_FACTOR = 0.26;          // 캐릭터 키 = 화면 높이의 26% (여러 개일 때 겹치지 않게 약간 축소)
const GRAVITY_FACTOR = 0.0011;     // 중력 = 화면 높이 비율(프레임당)
const FLOOR_RESTITUTION = 0.55;    // 바닥/벽에 부딪혔을 때 반발 계수(더 통통 튀도록 상향)
const BOUNCE_RESTITUTION = 0.85;   // 손에 맞고 튕겨나갈 때의 반발 계수(공처럼 통통 튀도록 높게)
const CHAR_BOUNCE_RESTITUTION = 0.8; // 캐릭터끼리 부딪혔을 때 반발 계수
const AIR_DRAG = 0.997;            // 공중에서의 감속
const GROUND_FRICTION = 0.9;       // 바닥에서의 감속
const HAND_VEL_TO_PXFRAME = 0.2;   // 손 속도(틱당 px) → 캐릭터 속도(프레임당 px) 환산 비율
const THROW_POWER = 1.4;           // 놓았을 때 던져지는 힘의 배수
const HIT_POWER = 2.2;             // 맞았을 때 튕겨나가는 힘(손 속도 대비 배수)
const HAND_RADIUS_FACTOR = 0.32;   // 손을 캐릭터 크기 대비 이만한 반지름의 원으로 취급
const HIT_COOLDOWN_MS = 90;        // 같은 캐릭터가 연속 프레임에 과하게 튕기지 않도록 하는 쿨다운

// ---------------- 패널 토글 ----------------
panelToggle.addEventListener('click', () => panel.classList.toggle('open'));

fullscreenBtn.addEventListener('click', () => {
  const el = document.documentElement;
  const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFullscreen) {
    const request = el.requestFullscreen || el.webkitRequestFullscreen; // iOS/구형 Safari 대응
    if (request) {
      const result = request.call(el);
      if (result && typeof result.catch === 'function') result.catch(() => {});
    }
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  }
});

switchCameraBtn.addEventListener('click', async () => {
  const prevFacingMode = currentFacingMode;
  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  mirrorSign = currentFacingMode === 'user' ? -1 : 1;
  camFrame.classList.toggle('no-mirror', currentFacingMode !== 'user');
  try {
    await startCamera();
  } catch (err) {
    // 전환 실패 시 원래 모드로 되돌리고 카메라를 다시 복구
    currentFacingMode = prevFacingMode;
    mirrorSign = currentFacingMode === 'user' ? -1 : 1;
    camFrame.classList.toggle('no-mirror', currentFacingMode !== 'user');
    try { await startCamera(); } catch (err2) { /* 복구도 실패하면 에러 메시지만 표시 */ }
    errorMsg.textContent = '카메라 전환에 실패했어요. 이 기기에는 카메라가 하나만 있을 수 있어요.';
    errorBox.classList.add('show');
    setTimeout(() => errorBox.classList.remove('show'), 2500);
  }
});

resetBtn.addEventListener('click', () => {
  characters = [];
  grabByHand = [null, null];
  charList.innerHTML = '';
  fileInput.value = '';
  updateCharCountHint();
});

fileInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files || []);
  for (const file of files) {
    if (characters.length >= MAX_CHARACTERS) {
      updateCharCountHint(true);
      break;
    }
    addCharacterFromFile(file);
  }
  fileInput.value = '';
});

function addCharacterFromFile(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const c = {
      id: nextCharId++,
      img,
      name: file.name.length > 16 ? file.name.slice(0, 14) + '…' : file.name,
      charX: null, charY: null,
      velX: 0, velY: 0,
      facingDir: 1,
      charState: 'idle',
      heldByHand: -1,
      onGround: false,
      landingSquash: 0,
      spinAngle: 0, angVel: 0,
      walkTargetX: null, walkChangeAt: 0,
      grabDwell: 0,
      nextHitAllowedAt: 0,
    };
    characters.push(c);
    spawnCharacter(c);
    renderCharListItem(c, url);
    updateCharCountHint();
  };
  img.src = url;
}

function renderCharListItem(c, url) {
  const row = document.createElement('div');
  row.className = 'char-item';
  row.id = `char-item-${c.id}`;
  row.innerHTML = `<img src="${url}" alt=""><span>${c.name}</span><button title="삭제">×</button>`;
  row.querySelector('button').addEventListener('click', () => removeCharacter(c.id));
  charList.appendChild(row);
}

function removeCharacter(id) {
  characters = characters.filter(c => c.id !== id);
  grabByHand = grabByHand.map(gid => gid === id ? null : gid);
  const row = document.getElementById(`char-item-${id}`);
  if (row) row.remove();
  updateCharCountHint();
}

function updateCharCountHint(full) {
  charCountHint.textContent = full
    ? `최대 ${MAX_CHARACTERS}개까지만 등록할 수 있어요`
    : `등록된 캐릭터 ${characters.length}개 (최대 ${MAX_CHARACTERS}개)`;
}

// ---------------- 카메라 시작 (전면/후면 전환 지원, 모바일/태블릿 대응) ----------------
async function startCamera() {
  // 카메라를 전환할 때 기존 스트림을 확실히 정지시켜 카메라가 두 번 켜지는 것을 방지
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
    currentStream = null;
  }

  const idealConstraints = {
    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  };
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia(idealConstraints);
  } catch (err) {
    // 저사양 기기/구형 카메라 등에서 해상도 제약이 실패하는 경우, 제약을 완화해 재시도
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false });
  }
  currentStream = stream;
  video.srcObject = stream;
  await new Promise(resolve => { video.onloadedmetadata = resolve; });
  await video.play();

  const vw = video.videoWidth, vh = video.videoHeight;
  // 카메라 실제 비율을 CSS 변수로 전달 - 화면 회전/크기 변경에도 순수 CSS로 자동 대응
  camFrame.style.setProperty('--ar', (vw / vh).toString());

  resizeOverlay();
}

function resizeOverlay() {
  const rect = camFrame.getBoundingClientRect();
  overlay.width = rect.width;
  overlay.height = rect.height;
}
window.addEventListener('resize', resizeOverlay);
// 모바일 브라우저의 주소창 표시/숨김, 분할화면 등 크기 변화를 폭넓게 감지
if (typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(resizeOverlay).observe(camFrame);
}
// 모바일/태블릿 회전 시 치수가 한 박자 늦게 확정되는 경우가 있어 약간의 지연 후 한 번 더 갱신
window.addEventListener('orientationchange', () => {
  resizeOverlay();
  setTimeout(resizeOverlay, 200);
  setTimeout(resizeOverlay, 500);
});

// ---------------- 얼굴 + 손(양손) 인식 루프 ----------------
async function runDetectionLoop() {
  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
  let tickCount = 0;

  async function detectTick() {
    if (video.readyState === 4) {
      const displaySize = { width: overlay.width, height: overlay.height };
      tickCount++;

      // 손 인식은 매 틱 실행 (제스처 반응성이 더 중요), 양손을 동시에 추적
      if (handLandmarker) {
        try {
          const results = handLandmarker.detectForVideo(video, performance.now());
          updateHandTracks(results, displaySize);
        } catch (err) {
          // 무시하고 계속 진행
        }
      }

      // 얼굴 인식은 3틱마다 한 번 (캐릭터의 기준점일 뿐이라 자주 갱신할 필요 없음)
      if (tickCount % 3 === 0) {
        try {
          const detection = await faceapi.detectSingleFace(video, options);
          if (detection) {
            const resized = faceapi.resizeResults(detection, displaySize);
            const box = resized.box;
            lastSeenAt = performance.now();
            lockedFrames = Math.min(lockedFrames + 1, 30);

            const target = { x: box.x, y: box.y, width: box.width, height: box.height };
            if (!currentBox) {
              currentBox = target;
            } else {
              const smoothing = 0.35;
              currentBox.x += (target.x - currentBox.x) * smoothing;
              currentBox.y += (target.y - currentBox.y) * smoothing;
              currentBox.width += (target.width - currentBox.width) * smoothing;
              currentBox.height += (target.height - currentBox.height) * smoothing;
            }
          } else {
            lockedFrames = Math.max(lockedFrames - 3, 0);
          }
        } catch (err) {
          // 모델 로딩 중이거나 프레임 스킵 - 무시하고 계속 진행
        }
      }
    }
    setTimeout(detectTick, 90);
  }
  detectTick();
}

// MediaPipe 손 인식 결과(양손, 정규화 좌표)를 화면 좌표로 변환하고 부드럽게 보정, 속도까지 계산
// 손의 좌우 판정(Left/Right)을 안정적인 슬롯 id로 사용해 프레임 간 추적이 끊기지 않게 함
function updateHandTracks(results, displaySize) {
  const now = performance.now();
  const seenSlot = [false, false];

  if (results && results.landmarks && results.landmarks.length) {
    results.landmarks.forEach((landmarks, i) => {
      const handedness = results.handednesses?.[i]?.[0]?.categoryName;
      const slot = handedness === 'Left' ? 0 : 1;
      if (seenSlot[slot]) return; // 같은 슬롯에 이미 손이 배정되었으면 이번 프레임은 건너뜀
      seenSlot[slot] = true;

      // 21개 랜드마크의 바운딩 박스 중심을 손 위치로 사용(정규화 좌표 0~1 → 화면 좌표로 변환)
      let minX = 1, maxX = 0, minY = 1, maxY = 0;
      for (const p of landmarks) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      }
      const hx = ((minX + maxX) / 2) * displaySize.width;
      const hy = ((minY + maxY) / 2) * displaySize.height;

      const track = handTracks[slot];
      if (!track.present) { track.smX = hx; track.smY = hy; }
      const smoothing = 0.55;
      const prevX = track.smX, prevY = track.smY;
      track.smX += (hx - track.smX) * smoothing;
      track.smY += (hy - track.smY) * smoothing;
      track.vx = track.smX - prevX;
      track.vy = track.smY - prevY;
      track.present = true;
      track.lastSeenAt = now;
    });
  }

  for (let i = 0; i < 2; i++) {
    if (!seenSlot[i] && now - handTracks[i].lastSeenAt > 250) {
      handTracks[i].present = false;
    }
  }
}

// ---------------- 렌더 루프 (매 프레임 부드럽게 그림) ----------------
let lastFrameT = 0;

function renderLoop(t) {
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  if (!lastFrameT) lastFrameT = t;
  const dt = Math.min((t - lastFrameT) / 16.6667, 3); // 60fps 기준 배수, 프레임이 튀어도 물리가 안정적이게
  lastFrameT = t;

  const now = performance.now();
  const faceVisible = currentBox && (now - lastSeenAt < LOST_TIMEOUT);

  if (faceVisible) {
    isLocked = lockedFrames > 6;
    drawBrackets(currentBox, isLocked, t);
    setStatus(isLocked ? '인식 완료' : '인식 중', isLocked);
  } else {
    isLocked = false;
    lockedFrames = 0;
    setStatus('카메라 대기 중', false);
  }
  // 안내 문구는 얼굴이 처음 인식되거나 캐릭터가 등장하면 사라짐
  guide.style.opacity = (faceVisible || characters.length > 0) ? '0' : '1';

  // 활성 상태인 손들(최근에 인식된 손만) - 최대 2개
  const hands = handTracks.map(h => (h.present && (t - h.lastSeenAt < 250)) ? h : null);

  // 손의 상하 움직임 기록(방방 튕기는 패턴 감지용) - 손마다 따로, 프레임당 한 번만 갱신
  const bounceDetectedByHand = [false, false];
  for (let hi = 0; hi < 2; hi++) {
    if (hands[hi]) {
      handYHistories[hi].push({ t, y: hands[hi].smY });
      while (handYHistories[hi].length && t - handYHistories[hi][0].t > 900) handYHistories[hi].shift();
      if (t > jumpCooldownUntil[hi] && detectHandBounce(handYHistories[hi])) {
        bounceDetectedByHand[hi] = true;
        jumpCooldownUntil[hi] = t + 600;
        handYHistories[hi] = [];
      }
    } else {
      handYHistories[hi] = [];
    }
  }

  // 1) 손과의 상호작용(잡기/튕기기/점프) 판단 + 각 캐릭터 물리 갱신
  for (const c of characters) {
    if (c.charX === null) spawnCharacter(c); // 안전장치(캔버스 크기 확정 전 업로드된 경우 대비)
    updateCharacterPhysics(c, t, dt, hands, bounceDetectedByHand);
  }
  // 2) 캐릭터끼리 서로 반대 방향으로 튕겨나가도록 충돌 처리
  resolveCharacterCollisions();
  // 3) 그리기
  for (const c of characters) drawCharacter(c, t);
  drawHandMarkers(hands, t);
  drawHitEffects(t);

  requestAnimationFrame(renderLoop);
}

function setStatus(text, locked) {
  if (statusText.textContent !== text) statusText.textContent = text;
  statusBadge.classList.toggle('locked', locked);
}

// AR 스캔 브라켓: 모서리 4개 + 락온 시 라벨
function drawBrackets(box, locked, t) {
  const { x, y, width: w, height: h } = box;
  const pad = w * 0.18;
  const bx = x - pad, by = y - pad, bw = w + pad * 2, bh = h + pad * 2;
  const armLen = Math.min(bw, bh) * 0.22;
  const color = locked ? getCssVar('--lime') : getCssVar('--cyan');

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = locked ? 14 : 8;

  const corners = [
    [bx, by, 1, 1],
    [bx + bw, by, -1, 1],
    [bx, by + bh, 1, -1],
    [bx + bw, by + bh, -1, -1],
  ];
  corners.forEach(([cx, cy, dx, dy]) => {
    ctx.beginPath();
    ctx.moveTo(cx, cy + armLen * dy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + armLen * dx, cy);
    ctx.stroke();
  });

  // 스캔 라인 (락온 전에만 위아래로 스캔하는 느낌)
  if (!locked) {
    const scanY = by + ((t / 900) % 1) * bh;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.moveTo(bx, scanY);
    ctx.lineTo(bx + bw, scanY);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // 라벨
  ctx.save();
  ctx.font = "600 13px 'Orbitron', sans-serif";
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  ctx.scale(mirrorSign, 1); // 전면 카메라(거울모드)일 때만 다시 뒤집어 정방향 텍스트로 보정
  const label = locked ? 'LOCKED · 캐릭터 등장' : 'SCANNING...';
  const labelX = mirrorSign * (bx + bw / 2);
  ctx.textAlign = 'center';
  ctx.fillText(label, labelX, by - 12);
  ctx.restore();
}

// 캐릭터의 현재 크기(화면 높이 비율 기준 - 해상도가 바뀌어도 일정한 비율 유지)
function getCharSize(c) {
  const targetH = overlay.height * SIZE_FACTOR;
  const ratio = c.img.naturalWidth / c.img.naturalHeight;
  return { targetW: targetH * ratio, targetH };
}

// 캐릭터가 처음 등장할 위치 - 얼굴이 인식되어 있으면 그 근처(겹치지 않게 살짝 랜덤 오프셋), 아니면 화면 중앙 부근
function spawnCharacter(c) {
  if (!overlay.width || !overlay.height) return;
  const jitter = (Math.random() - 0.5) * overlay.width * 0.2;
  if (currentBox) {
    c.charX = currentBox.x + currentBox.width / 2 + jitter;
    c.charY = currentBox.y + currentBox.height / 2;
  } else {
    c.charX = overlay.width / 2 + jitter;
    c.charY = overlay.height * 0.4;
  }
  c.velX = 0; c.velY = 0;
  c.charState = 'idle';
  c.onGround = false;
}

// 최근 손의 상하 움직임에서 "방방 튕기는" 패턴(위-아래-위-아래)이 있었는지 판단
function detectHandBounce(history) {
  if (history.length < 4) return false;
  let dirChanges = 0, lastDir = 0;
  for (let i = 1; i < history.length; i++) {
    const dy = history[i].y - history[i - 1].y;
    if (Math.abs(dy) < 2) continue; // 미세한 떨림은 무시
    const dir = dy > 0 ? 1 : -1;
    if (lastDir !== 0 && dir !== lastDir) dirChanges++;
    lastDir = dir;
  }
  return dirChanges >= 3;
}

// 캐릭터 하나의 물리 갱신: 중력 + 바닥/벽 충돌 + 두 손과의 공 같은 상호작용(캐치/튕기기/던지기/점프)
function updateCharacterPhysics(c, t, dt, hands, bounceDetectedByHand) {
  const { targetW, targetH } = getCharSize(c);
  const floorY = overlay.height * 0.90 - targetH / 2;
  const gravity = overlay.height * GRAVITY_FACTOR;
  const radius = (targetW + targetH) / 4;
  const collideRadius = radius + targetW * HAND_RADIUS_FACTOR;

  // ---- 잡혀 있는 캐릭터: 잡고 있는 손을 따라가거나, 손이 사라지면 던져짐 ----
  if (c.charState === 'grabbed') {
    const hi = c.heldByHand;
    const hand = hands[hi];
    if (hand) {
      c.charX += (hand.smX - c.charX) * 0.6;
      c.charY += (hand.smY - c.charY) * 0.6;
      c.velX = 0; c.velY = 0;
      c.onGround = false;
    } else {
      c.charState = 'idle';
      grabByHand[hi] = null;
      const track = handTracks[hi];
      c.velX = track.vx * HAND_VEL_TO_PXFRAME * THROW_POWER * 5;
      c.velY = track.vy * HAND_VEL_TO_PXFRAME * THROW_POWER * 5;
      c.onGround = false;
    }
    c.spinAngle += c.angVel * dt;
    c.angVel *= 0.985;
    return;
  }

  // ---- idle 캐릭터: 두 손 각각과의 상호작용 판단 ----
  let anySlowOverlap = false;
  let grabCandidateHand = -1;
  let bounced = false;

  for (let hi = 0; hi < 2 && !bounced; hi++) {
    const hand = hands[hi];
    if (!hand) continue;
    const dx = hand.smX - c.charX, dy = hand.smY - c.charY;
    const dist = Math.max(Math.hypot(dx, dy), 0.001);
    const overlapping = dist < collideRadius;
    const handSpeed = Math.hypot(hand.vx, hand.vy);

    if (overlapping && handSpeed >= targetW * GRAB_SPEED_FACTOR && t > c.nextHitAllowedAt) {
      // 공처럼 튕겨나감: 손 속도를 반영해 반사 + 펀치
      const nx = -dx / dist, ny = -dy / dist; // 캐릭터가 밀려날 방향(손 반대쪽)
      const handVX = hand.vx * HAND_VEL_TO_PXFRAME;
      const handVY = hand.vy * HAND_VEL_TO_PXFRAME;
      const relVX = c.velX - handVX, relVY = c.velY - handVY;
      const dot = relVX * nx + relVY * ny; // 음수면 캐릭터가 손 쪽으로 다가가는 중
      let rvx = relVX, rvy = relVY;
      if (dot < 0) {
        rvx = relVX - 2 * dot * nx;
        rvy = relVY - 2 * dot * ny;
      }
      const punch = handSpeed * HAND_VEL_TO_PXFRAME * HIT_POWER;
      c.velX = handVX + rvx * BOUNCE_RESTITUTION + nx * punch;
      c.velY = handVY + rvy * BOUNCE_RESTITUTION + ny * punch - overlay.height * 0.004;
      // 접선 방향 성분을 스핀으로 변환 → 날아가면서 데굴데굴 회전
      const tangentRel = relVX * (-ny) + relVY * nx;
      c.angVel += tangentRel * 0.05;
      // 충격 반동(스쿼시) - 세게 맞을수록 더 납작하게 눌렸다 튀어나옴
      c.landingSquash = Math.min(1, punch / (overlay.height * 0.05));
      // 겹침 방지: 충돌 반경 밖으로 즉시 밀어내기
      c.charX = hand.smX + nx * collideRadius;
      c.charY = hand.smY + ny * collideRadius;
      c.nextHitAllowedAt = t + HIT_COOLDOWN_MS;
      c.onGround = false;
      c.grabDwell = 0;
      c.facingDir = c.velX >= 0 ? 1 : -1;
      hitEffects.push({ x: hand.smX, y: hand.smY, t });
      bounced = true;
      continue;
    }

    if (overlapping && handSpeed < targetW * GRAB_SPEED_FACTOR && grabByHand[hi] === null) {
      anySlowOverlap = true;
      grabCandidateHand = hi;
    }

    // 캐릭터 발밑 근처에서 이 손이 위아래로 방방 튕겼다면 → 점프
    const belowAligned = Math.abs(dx) < targetW * 0.7 && dy > targetH * 0.1 && dy < targetH * 3.2;
    if (belowAligned && bounceDetectedByHand[hi]) {
      c.velY = -overlay.height * 0.021;
      c.onGround = false;
    }
  }

  if (!bounced) {
    if (anySlowOverlap) {
      c.grabDwell += dt;
      if (c.grabDwell > GRAB_DWELL_FRAMES) {
        c.charState = 'grabbed';
        c.heldByHand = grabCandidateHand;
        grabByHand[grabCandidateHand] = c.id;
      }
    } else {
      c.grabDwell = 0;
    }
  }

  // ---- 물리 적분(중력/벽/바닥) + idle 어슬렁 ----
  if (c.charState === 'idle') {
    velIntegrate(c, dt, gravity, floorY, targetW, targetH, t);
  }

  c.landingSquash *= 0.85;
  c.spinAngle += c.angVel * dt;
  c.angVel *= c.onGround ? 0.9 : 0.985;
  if (Math.abs(c.velX) > 0.05) c.facingDir = c.velX > 0 ? 1 : -1;
}

// 실제 위치 적분(중력/벽/바닥) + idle 어슬렁 로직 - grabbed가 아닐 때만 호출
function velIntegrate(c, dt, gravity, floorY, targetW, targetH, t) {
  c.velY += gravity * dt;
  c.charX += c.velX * dt;
  c.charY += c.velY * dt;

  // 좌우 벽 충돌
  if (c.charX < targetW / 2) { c.charX = targetW / 2; c.velX = Math.abs(c.velX) * FLOOR_RESTITUTION; c.landingSquash = Math.max(c.landingSquash, Math.min(1, Math.abs(c.velX) / (overlay.height * 0.04))); }
  if (c.charX > overlay.width - targetW / 2) { c.charX = overlay.width - targetW / 2; c.velX = -Math.abs(c.velX) * FLOOR_RESTITUTION; c.landingSquash = Math.max(c.landingSquash, Math.min(1, Math.abs(c.velX) / (overlay.height * 0.04))); }
  // 천장 충돌(너무 세게 던졌을 때 화면 밖으로 사라지지 않도록)
  if (c.charY < targetH / 2) { c.charY = targetH / 2; c.velY = Math.abs(c.velY) * FLOOR_RESTITUTION; }

  // 바닥 충돌
  if (c.charY >= floorY) {
    const impactV = Math.abs(c.velY);
    c.charY = floorY;
    if (impactV > 1.2) {
      c.velY = -c.velY * FLOOR_RESTITUTION;
      c.landingSquash = Math.max(c.landingSquash, Math.min(1, impactV / (overlay.height * 0.045)));
    } else {
      c.velY = 0;
    }
    c.velX *= GROUND_FRICTION;
    c.onGround = true;
  } else {
    c.onGround = false;
    c.velX *= AIR_DRAG;
  }

  // 바닥에서 속도가 거의 없으면 스스로 좌우로 어슬렁거림
  if (c.onGround) {
    if (t > c.walkChangeAt || c.walkTargetX === null) {
      c.walkTargetX = Math.random() * (overlay.width - targetW) + targetW / 2;
      c.walkChangeAt = t + 2500 + Math.random() * 3000;
    }
    if (Math.hypot(c.velX, c.velY) < 1.5) {
      const toTarget = c.walkTargetX - c.charX;
      if (Math.abs(toTarget) > targetW * 0.35) {
        c.velX += Math.sign(toTarget) * 0.14 * dt;
      }
    }
  }
}

// 캐릭터끼리 서로 겹치면 "정반대 방향"으로 튕겨나가도록 탄성 충돌 처리(공-공 충돌 느낌)
function resolveCharacterCollisions() {
  for (let i = 0; i < characters.length; i++) {
    const a = characters[i];
    if (a.charX === null || a.charState === 'grabbed') continue;
    const sizeA = getCharSize(a);
    const ra = (sizeA.targetW + sizeA.targetH) / 4;
    for (let j = i + 1; j < characters.length; j++) {
      const b = characters[j];
      if (b.charX === null || b.charState === 'grabbed') continue;
      const sizeB = getCharSize(b);
      const rb = (sizeB.targetW + sizeB.targetH) / 4;
      const dx = b.charX - a.charX, dy = b.charY - a.charY;
      const dist = Math.hypot(dx, dy) || 0.001;
      const minDist = ra + rb;
      if (dist >= minDist) continue;

      const nx = dx / dist, ny = dy / dist;

      // 겹친 만큼 정확히 떨어뜨려 놓기(서로 반대 방향으로)
      const overlap = minDist - dist;
      a.charX -= nx * overlap * 0.5; a.charY -= ny * overlap * 0.5;
      b.charX += nx * overlap * 0.5; b.charY += ny * overlap * 0.5;

      // 법선 방향 속도 성분을 완전히 교환(탄성 충돌) - 서로 정반대 방향으로 튕겨나가는 핵심
      const avn = a.velX * nx + a.velY * ny;
      const bvn = b.velX * nx + b.velY * ny;
      const exchange = (bvn - avn) * CHAR_BOUNCE_RESTITUTION;
      a.velX += nx * exchange; a.velY += ny * exchange;
      b.velX -= nx * exchange; b.velY -= ny * exchange;

      // 가만히 있다가 맞닿아도 확실히 서로 밀려나도록 최소 반발 속도(팝) 추가
      const minPush = overlay.height * 0.007;
      a.velX -= nx * minPush; a.velY -= ny * minPush * 0.3;
      b.velX += nx * minPush; b.velY += ny * minPush * 0.3;

      const impactSpeed = Math.abs(avn - bvn);
      const squash = Math.min(1, impactSpeed / (overlay.height * 0.035));
      a.landingSquash = Math.max(a.landingSquash, squash);
      b.landingSquash = Math.max(b.landingSquash, squash);
      a.angVel += (dx * a.velY - dy * a.velX) * 0.0006;
      b.angVel += (dx * b.velY - dy * b.velX) * 0.0006;

      a.onGround = false; b.onGround = false;
    }
  }
}

// 캐릭터를 화면의 실제 물리 위치(charX, charY)에 그림
// - 공중에서는 낙하 속도에 따라 늘어나고 데굴데굴 회전, 충격을 받으면 순간적으로 눌렸다 튀어나오고, 걸을 땐 뒤뚱거림
function drawCharacter(c, t) {
  const { targetW, targetH } = getCharSize(c);
  const airborne = !c.onGround && c.charState !== 'grabbed';

  let squashY = 1, squashX = 1, tilt = 0;

  if (c.charState === 'grabbed') {
    tilt = Math.sin(t / 500) * 0.05; // 손에 대롱대롱 들려있는 느낌
  } else if (airborne) {
    const stretch = Math.min(0.4, Math.hypot(c.velX, c.velY) / (overlay.height * 0.05));
    squashY = 1 + stretch * 0.3 - c.landingSquash * 0.3;   // 충격 순간엔 확 눌렸다가
    squashX = 1 - stretch * 0.18 + c.landingSquash * 0.26; // 곧바로 다시 늘어나며 튕겨나가는 반동
    tilt = c.spinAngle; // 날아가는 동안 실제로 데굴데굴 회전
  } else {
    const walking = Math.abs(c.velX) > 0.3;
    const waddle = walking ? Math.sin(t / 220) : 0;
    squashY = 1 - c.landingSquash * 0.34 + (walking ? Math.abs(waddle) * 0.05 : 0);
    squashX = 1 + c.landingSquash * 0.28 - (walking ? Math.abs(waddle) * 0.04 : 0);
    tilt = walking ? waddle * 0.12 : 0;
  }

  ctx.save();
  ctx.shadowColor = c.charState === 'grabbed' ? getCssVar('--lime') : (airborne ? getCssVar('--magenta') : getCssVar('--cyan'));
  ctx.shadowBlur = airborne ? 30 : 22;
  ctx.globalAlpha = 0.98;

  ctx.translate(c.charX, c.charY);
  ctx.rotate(tilt);
  // 그림 자체가 화면 거울반전으로 뒤집혀 보이지 않도록 기본 보정(-1)에
  // 이동 방향(facingDir)을 곱해, 이동/비행 방향을 바라보도록 좌우를 전환
  ctx.scale(mirrorSign * c.facingDir * squashX, squashY);
  ctx.drawImage(c.img, -targetW / 2, -targetH / 2, targetW, targetH);
  ctx.restore();
}

// 인식된 손 위치에 작은 마커를 표시해 "손이 잘 인식되고 있는지" 눈으로 바로 확인 가능하게 함
function drawHandMarkers(hands, t) {
  hands.forEach((hand) => {
    if (!hand) return;
    const pulse = 1 + Math.sin(t / 200) * 0.12;
    ctx.save();
    ctx.strokeStyle = getCssVar('--lime');
    ctx.shadowColor = getCssVar('--lime');
    ctx.shadowBlur = 10;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(hand.smX, hand.smY, 16 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });
}

// 때렸을 때 손 위치에서 잠깐 퍼지는 충격 링 이펙트(여러 개 동시 가능)
function drawHitEffects(t) {
  hitEffects = hitEffects.filter(e => t - e.t <= 400);
  for (const e of hitEffects) {
    const p = (t - e.t) / 400;
    ctx.save();
    ctx.globalAlpha = 1 - p;
    ctx.strokeStyle = getCssVar('--magenta');
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(e.x, e.y, 14 + p * 46, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function getCssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ---------------- 초기화 ----------------
async function init() {
  try {
    statusText.textContent = '모델 불러오는 중';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      (async () => {
        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
        );
        const baseModelOptions = {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
          },
          runningMode: 'VIDEO',
          numHands: 2,
          minHandDetectionConfidence: 0.5,
          minHandPresenceConfidence: 0.5,
          minTrackingConfidence: 0.5,
        };
        try {
          handLandmarker = await HandLandmarker.createFromOptions(vision, {
            ...baseModelOptions,
            baseOptions: { ...baseModelOptions.baseOptions, delegate: 'GPU' },
          });
        } catch (gpuErr) {
          // 일부 환경(구형 GPU/드라이버)에서는 GPU 델리게이트가 실패할 수 있어 CPU로 재시도
          handLandmarker = await HandLandmarker.createFromOptions(vision, {
            ...baseModelOptions,
            baseOptions: { ...baseModelOptions.baseOptions, delegate: 'CPU' },
          });
        }
      })(),
    ]);

    statusText.textContent = '카메라 연결 중';
    await startCamera();

    statusText.textContent = '카메라 대기 중';
    runDetectionLoop();
    requestAnimationFrame(renderLoop);
  } catch (err) {
    console.error(err);
    errorMsg.textContent = (err && err.message) ? err.message : String(err);
    errorBox.classList.add('show');
  }
}

init();
</script>
