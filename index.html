<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR 캐릭터 인식 · 그래픽디자인과</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7/dist/handpose.min.js"></script>

<style>
  :root{
    --bg: #05050a;
    --panel: #0d0d16;
    --panel-border: #1c1c2b;
    --cyan: #00eaff;
    --magenta: #ff2f92;
    --lime: #b6ff3c;
    --ink: #eef2f7;
    --muted: #7d879c;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', system-ui, sans-serif;
    overflow: hidden;
  }

  /* ---------- 배경 그리드 (AR 세계관 연출) ---------- */
  .grid-bg{
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,234,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,234,255,0.06) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(circle at center, black 40%, transparent 85%);
  }

  /* ---------- 헤더 ---------- */
  header{
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    pointer-events: none;
  }
  .brand{
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--cyan);
    display: flex; align-items: center; gap: 10px;
    text-shadow: 0 0 14px rgba(0,234,255,0.5);
  }
  .brand .dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--lime);
    box-shadow: 0 0 10px var(--lime);
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0.25} }

  .brand small{
    font-family: 'Pretendard', sans-serif;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0;
    font-size: 12px;
  }

  /* ---------- 무대 (카메라 + 캔버스) ---------- */
  .stage-wrap{
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }
  .cam-frame{
    position: relative;
    max-width: 100vw; max-height: 100vh;
    transform: scaleX(-1); /* 거울 모드 */
  }
  video, canvas{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  video{ background: #000; }

  /* ---------- 안내 문구 ---------- */
  .guide{
    position: absolute; left: 50%; bottom: 9%;
    transform: translateX(-50%);
    z-index: 15;
    text-align: center;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .guide .big{
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 3vw, 34px);
    letter-spacing: 0.04em;
    color: var(--ink);
    text-shadow: 0 0 20px rgba(0,234,255,0.35);
  }
  .guide .small{
    margin-top: 8px;
    font-size: clamp(12px, 1.3vw, 16px);
    color: var(--muted);
  }

  /* ---------- 상태 뱃지 ---------- */
  .status-badge{
    position: fixed; top: 20px; right: 28px;
    z-index: 20;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: rgba(13,13,22,0.7);
    border: 1px solid var(--panel-border);
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    backdrop-filter: blur(6px);
  }
  .status-badge .led{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
  }
  .status-badge.locked{ color: var(--lime); border-color: rgba(182,255,60,0.3); }
  .status-badge.locked .led{ background: var(--lime); box-shadow: 0 0 8px var(--lime); }

  /* ---------- 컨트롤 패널 (교사용) ---------- */
  .panel-toggle{
    position: fixed; bottom: 20px; right: 20px;
    z-index: 30;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s;
  }
  .panel-toggle:hover{ color: var(--cyan); border-color: var(--cyan); }

  .panel{
    position: fixed; bottom: 78px; right: 20px;
    z-index: 30;
    width: 280px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 18px;
    transform: translateY(12px);
    opacity: 0;
    pointer-events: none;
    transition: 0.22s ease;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .panel.open{
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .panel h3{
    margin: 0 0 4px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--cyan);
  }
  .panel p.hint{
    margin: 0 0 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .upload-btn{
    display: flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px dashed rgba(0,234,255,0.4);
    background: rgba(0,234,255,0.06);
    color: var(--cyan);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  .upload-btn:hover{ background: rgba(0,234,255,0.12); }
  input[type=file]{ display:none; }

  .char-preview{
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .char-preview img{
    width: 40px; height: 40px; object-fit: contain;
    background: #000;
    border-radius: 8px;
    border: 1px solid var(--panel-border);
  }
  .panel-row{ display:flex; gap:8px; margin-top: 10px; }
  .mini-btn{
    flex:1;
    padding: 9px 0;
    border-radius: 8px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }
  .mini-btn:hover{ color: var(--ink); border-color: var(--muted); }

  .error-box{
    position: fixed; inset:0; z-index: 50;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(5,5,10,0.92);
    text-align: center; padding: 40px;
  }
  .error-box.show{ display:flex; }
  .error-box .msg{ max-width: 480px; }
  .error-box h2{ font-family:'Orbitron',sans-serif; color: var(--magenta); }
  .error-box p{ color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<header>
  <div class="brand">
    <span class="dot"></span>
    AR CHARACTER SCANNER <small>덕영고등학교 · 그래픽디자인과 XR</small>
  </div>
</header>

<div class="status-badge" id="statusBadge">
  <span class="led"></span>
  <span id="statusText">카메라 준비 중</span>
</div>

<div class="stage-wrap">
  <div class="cam-frame" id="camFrame">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
</div>

<div class="guide" id="guide">
  <div class="big">카메라 앞에 서 보세요</div>
  <div class="small">캐릭터를 손으로 잡아 던지거나, 때리거나, 아래서 방방 튕겨보세요</div>
</div>

<button class="panel-toggle" id="panelToggle" title="설정">⚙</button>
<div class="panel" id="panel">
  <h3>캐릭터 업로드</h3>
  <p class="hint">배경을 투명하게 제거한 PNG 파일을 올려주세요. 업로드 즉시 화면에 바로 적용됩니다.</p>
  <label class="upload-btn" for="fileInput">＋ 이미지 선택</label>
  <input type="file" id="fileInput" accept="image/png, image/webp, image/gif">
  <div class="char-preview" id="charPreview" style="display:none;">
    <img id="charPreviewImg" src="" alt="">
    <span id="charPreviewName"></span>
  </div>
  <div class="panel-row">
    <button class="mini-btn" id="resetBtn">캐릭터 제거</button>
    <button class="mini-btn" id="fullscreenBtn">전체화면</button>
  </div>
</div>

<div class="error-box" id="errorBox">
  <div class="msg">
    <h2>카메라를 시작할 수 없어요</h2>
    <p id="errorMsg">브라우저의 카메라 권한을 확인해주세요. 이 페이지가 https 주소(예: GitHub Pages)로 열려 있어야 카메라를 사용할 수 있습니다.</p>
  </div>
</div>

<script>
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const camFrame = document.getElementById('camFrame');
const guide = document.getElementById('guide');
const statusBadge = document.getElementById('statusBadge');
const statusText = document.getElementById('statusText');
const panel = document.getElementById('panel');
const panelToggle = document.getElementById('panelToggle');
const fileInput = document.getElementById('fileInput');
const charPreview = document.getElementById('charPreview');
const charPreviewImg = document.getElementById('charPreviewImg');
const charPreviewName = document.getElementById('charPreviewName');
const resetBtn = document.getElementById('resetBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const errorBox = document.getElementById('errorBox');
const errorMsg = document.getElementById('errorMsg');

let characterImg = null;
let currentBox = null;      // 화면에 실제로 그려지는(보간된) 얼굴 박스 - 이제 캐릭터 위치의 기준이 아니라
                             // 스캔 브라켓 표시 + 캐릭터 최초 등장 위치 참고용으로만 사용
let lastSeenAt = 0;         // 마지막으로 얼굴을 본 시각
let lockedFrames = 0;       // 연속으로 안정적으로 인식된 프레임 수
let isLocked = false;
const LOST_TIMEOUT = 1400;  // 이 시간(ms) 동안 못 찾으면 "인식 끊김" 처리

// ---- 손 인식 상태 ----
let handModel = null;
const handState = { present: false, smX: 0, smY: 0, vx: 0, vy: 0, lastSeenAt: 0 };

// ---- 캐릭터 물리 상태 (얼굴 위치에 고정되지 않고 화면 전체를 자유롭게 움직임) ----
let charX = null, charY = null;   // 캐릭터 중심의 절대 화면 좌표
let velX = 0, velY = 0;           // 속도(픽셀/프레임, 60fps 기준)
let facingDir = 1;                // 1: 기본 방향, -1: 반대 방향(이동 방향에 따라 자동 전환)
let charState = 'idle';           // 'idle' | 'grabbed'
let onGround = false;
let landingSquash = 0;            // 착지 충격 스쿼시 강도(0~1, 서서히 감쇠)
let walkTargetX = null;           // idle 상태에서 바닥 위를 어슬렁거릴 목표 x
let walkChangeAt = 0;

let jumpCooldownUntil = 0;
let handYHistory = [];
let hitEffect = null;             // { x, y, t } 때리기 이펙트 표시용

const GRAB_RADIUS_FACTOR = 0.9;    // 캐릭터 크기 대비 잡기 인식 반경
const HIT_SPEED_FACTOR = 0.22;     // 캐릭터 크기 대비 "때리기"로 판정할 손 속도
const SIZE_FACTOR = 0.30;          // 캐릭터 키 = 화면 높이의 30%
const GRAVITY_FACTOR = 0.0011;     // 중력 = 화면 높이 비율(프레임당)
const RESTITUTION = 0.42;          // 바닥/벽에 부딪혔을 때 반발 계수
const AIR_DRAG = 0.997;            // 공중에서의 감속
const GROUND_FRICTION = 0.86;      // 바닥에서의 감속
const HAND_VEL_TO_PXFRAME = 0.2;   // 손 속도(틱당 px) → 캐릭터 속도(프레임당 px) 환산 비율
const THROW_POWER = 1.4;           // 놓았을 때 던져지는 힘의 배수
const HIT_POWER = 2.6;             // 맞았을 때 튕겨나가는 힘의 배수

// ---------------- 패널 토글 ----------------
panelToggle.addEventListener('click', () => panel.classList.toggle('open'));

fullscreenBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

resetBtn.addEventListener('click', () => {
  characterImg = null;
  charX = null; charY = null;
  velX = 0; velY = 0;
  charState = 'idle';
  charPreview.style.display = 'none';
  fileInput.value = '';
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    characterImg = img;
    spawnCharacter(); // 업로드 시점의 얼굴 위치(없으면 화면 중앙)에서 등장
    charPreviewImg.src = url;
    charPreviewName.textContent = file.name.length > 14 ? file.name.slice(0,12)+'…' : file.name;
    charPreview.style.display = 'flex';
  };
  img.src = url;
});

// ---------------- 카메라 시작 ----------------
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(resolve => { video.onloadedmetadata = resolve; });
  await video.play();

  const vw = video.videoWidth, vh = video.videoHeight;
  // 비디오 요소가 실제 영상 비율을 그대로 갖도록 하여, 캔버스 좌표 계산을 단순화
  camFrame.style.aspectRatio = `${vw} / ${vh}`;
  const winRatio = window.innerWidth / window.innerHeight;
  const vidRatio = vw / vh;
  if (vidRatio > winRatio) {
    camFrame.style.width = '100vw';
    camFrame.style.height = 'auto';
  } else {
    camFrame.style.height = '100vh';
    camFrame.style.width = 'auto';
  }

  resizeOverlay();
}

function resizeOverlay() {
  const rect = camFrame.getBoundingClientRect();
  overlay.width = rect.width;
  overlay.height = rect.height;
}
window.addEventListener('resize', resizeOverlay);

// ---------------- 얼굴 + 손 인식 루프 ----------------
async function runDetectionLoop() {
  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
  let tickCount = 0;

  async function detectTick() {
    if (video.readyState === 4) {
      const displaySize = { width: overlay.width, height: overlay.height };
      tickCount++;

      // 손 인식은 매 틱 실행 (제스처 반응성이 더 중요)
      if (handModel) {
        try {
          const hands = await handModel.estimateHands(video);
          updateHandState(hands, displaySize);
        } catch (err) {
          // 무시하고 계속 진행
        }
      }

      // 얼굴 인식은 3틱마다 한 번 (캐릭터의 기준점일 뿐이라 자주 갱신할 필요 없음)
      if (tickCount % 3 === 0) {
        try {
          const detection = await faceapi.detectSingleFace(video, options);
          if (detection) {
            const resized = faceapi.resizeResults(detection, displaySize);
            const box = resized.box;
            lastSeenAt = performance.now();
            lockedFrames = Math.min(lockedFrames + 1, 30);

            const target = { x: box.x, y: box.y, width: box.width, height: box.height };
            if (!currentBox) {
              currentBox = target;
            } else {
              const smoothing = 0.35;
              currentBox.x += (target.x - currentBox.x) * smoothing;
              currentBox.y += (target.y - currentBox.y) * smoothing;
              currentBox.width += (target.width - currentBox.width) * smoothing;
              currentBox.height += (target.height - currentBox.height) * smoothing;
            }
          } else {
            lockedFrames = Math.max(lockedFrames - 3, 0);
          }
        } catch (err) {
          // 모델 로딩 중이거나 프레임 스킵 - 무시하고 계속 진행
        }
      }
    }
    setTimeout(detectTick, 90);
  }
  detectTick();
}

// 손 인식 결과를 부드럽게 보정하고, 속도(vx, vy)까지 계산해서 저장
function updateHandState(hands, displaySize) {
  const now = performance.now();
  if (hands && hands.length > 0) {
    const [x1, y1] = hands[0].boundingBox.topLeft;
    const [x2, y2] = hands[0].boundingBox.bottomRight;
    const scaleX = displaySize.width / video.videoWidth;
    const scaleY = displaySize.height / video.videoHeight;
    const hx = ((x1 + x2) / 2) * scaleX;
    const hy = ((y1 + y2) / 2) * scaleY;

    if (!handState.present) {
      handState.smX = hx; handState.smY = hy;
    }
    const smoothing = 0.5;
    const prevX = handState.smX, prevY = handState.smY;
    handState.smX += (hx - handState.smX) * smoothing;
    handState.smY += (hy - handState.smY) * smoothing;
    handState.vx = handState.smX - prevX;
    handState.vy = handState.smY - prevY;
    handState.present = true;
    handState.lastSeenAt = now;
  } else if (now - handState.lastSeenAt > 250) {
    handState.present = false;
  }
}

// ---------------- 렌더 루프 (매 프레임 부드럽게 그림) ----------------
let lastFrameT = 0;

function renderLoop(t) {
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  if (!lastFrameT) lastFrameT = t;
  const dt = Math.min((t - lastFrameT) / 16.6667, 3); // 60fps 기준 배수, 프레임이 튀어도 물리가 안정적이게
  lastFrameT = t;

  const now = performance.now();
  const faceVisible = currentBox && (now - lastSeenAt < LOST_TIMEOUT);

  if (faceVisible) {
    isLocked = lockedFrames > 6;
    drawBrackets(currentBox, isLocked, t);
    setStatus(isLocked ? '인식 완료' : '인식 중', isLocked);
  } else {
    isLocked = false;
    lockedFrames = 0;
    setStatus('카메라 대기 중', false);
  }
  // 안내 문구는 얼굴이 처음 인식되거나 캐릭터가 등장하면 사라짐
  guide.style.opacity = (faceVisible || characterImg) ? '0' : '1';

  if (characterImg) {
    if (charX === null) spawnCharacter(); // 안전장치(캔버스 크기 확정 전 업로드된 경우 대비)
    updateCharacterPhysics(t, dt);
    drawCharacter(t);
  }

  requestAnimationFrame(renderLoop);
}

function setStatus(text, locked) {
  if (statusText.textContent !== text) statusText.textContent = text;
  statusBadge.classList.toggle('locked', locked);
}

// AR 스캔 브라켓: 모서리 4개 + 락온 시 라벨
function drawBrackets(box, locked, t) {
  const { x, y, width: w, height: h } = box;
  const pad = w * 0.18;
  const bx = x - pad, by = y - pad, bw = w + pad * 2, bh = h + pad * 2;
  const armLen = Math.min(bw, bh) * 0.22;
  const color = locked ? getCssVar('--lime') : getCssVar('--cyan');

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = locked ? 14 : 8;

  const corners = [
    [bx, by, 1, 1],
    [bx + bw, by, -1, 1],
    [bx, by + bh, 1, -1],
    [bx + bw, by + bh, -1, -1],
  ];
  corners.forEach(([cx, cy, dx, dy]) => {
    ctx.beginPath();
    ctx.moveTo(cx, cy + armLen * dy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + armLen * dx, cy);
    ctx.stroke();
  });

  // 스캔 라인 (락온 전에만 위아래로 스캔하는 느낌)
  if (!locked) {
    const scanY = by + ((t / 900) % 1) * bh;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.moveTo(bx, scanY);
    ctx.lineTo(bx + bw, scanY);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // 라벨
  ctx.save();
  ctx.font = "600 13px 'Orbitron', sans-serif";
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  ctx.scale(-1, 1); // 부모가 거울반전이라 텍스트가 뒤집히므로 다시 뒤집어 정방향으로
  const label = locked ? 'LOCKED · 캐릭터 등장' : 'SCANNING...';
  const labelX = -(bx + bw / 2);
  ctx.textAlign = 'center';
  ctx.fillText(label, labelX, by - 12);
  ctx.restore();
}

// 캐릭터의 현재 크기(화면 높이 비율 기준 - 해상도가 바뀌어도 일정한 비율 유지)
function getCharSize() {
  const targetH = overlay.height * SIZE_FACTOR;
  const ratio = characterImg.naturalWidth / characterImg.naturalHeight;
  return { targetW: targetH * ratio, targetH };
}

// 캐릭터가 처음 등장할 위치 - 얼굴이 인식되어 있으면 그 자리, 아니면 화면 중앙
function spawnCharacter() {
  if (!overlay.width || !overlay.height) return;
  if (currentBox) {
    charX = currentBox.x + currentBox.width / 2;
    charY = currentBox.y + currentBox.height / 2;
  } else {
    charX = overlay.width / 2;
    charY = overlay.height * 0.5;
  }
  velX = 0; velY = 0;
  charState = 'idle';
  onGround = false;
}

// 최근 손의 상하 움직임에서 "방방 튕기는" 패턴(위-아래-위-아래)이 있었는지 판단
function detectHandBounce(t) {
  if (handYHistory.length < 4) return false;
  let dirChanges = 0, lastDir = 0;
  for (let i = 1; i < handYHistory.length; i++) {
    const dy = handYHistory[i].y - handYHistory[i - 1].y;
    if (Math.abs(dy) < 2) continue; // 미세한 떨림은 무시
    const dir = dy > 0 ? 1 : -1;
    if (lastDir !== 0 && dir !== lastDir) dirChanges++;
    lastDir = dir;
  }
  return dirChanges >= 3;
}

// 캐릭터 물리 갱신: 중력 + 바닥/벽 충돌 + 손 상호작용(잡기/던지기/때리기/점프)
function updateCharacterPhysics(t, dt) {
  const { targetW, targetH } = getCharSize();
  const floorY = overlay.height * 0.90 - targetH / 2;
  const gravity = overlay.height * GRAVITY_FACTOR;

  const hand = handState.present && (t - handState.lastSeenAt < 250) ? handState : null;
  const dx = hand ? hand.smX - charX : 0;
  const dy = hand ? hand.smY - charY : 0;
  const dist = hand ? Math.hypot(dx, dy) : Infinity;
  const overlapping = !!hand && Math.abs(dx) < targetW * 0.65 && Math.abs(dy) < targetH * 0.65;

  // ---- 손과의 상호작용 판단 ----
  if (hand) {
    const speed = Math.hypot(hand.vx, hand.vy); // 손 속도 (틱당 px)
    const hitThreshold = targetW * HIT_SPEED_FACTOR;

    if (charState !== 'grabbed' && overlapping && speed > hitThreshold) {
      // 때리기 → 손 반대 방향으로 튕겨나감
      const norm = Math.max(dist, 1);
      const impulse = speed * HAND_VEL_TO_PXFRAME * HIT_POWER;
      velX += (-dx / norm) * impulse;
      velY += (-dy / norm) * impulse - overlay.height * 0.01; // 살짝 위로
      hitEffect = { x: hand.smX, y: hand.smY, t };
      onGround = false;
    } else if (charState === 'idle' && overlapping && dist < targetW * GRAB_RADIUS_FACTOR) {
      charState = 'grabbed';
    } else if (charState === 'grabbed' && !overlapping) {
      // 놓기 → 손의 최근 움직임 속도로 "던져짐"
      charState = 'idle';
      velX = hand.vx * HAND_VEL_TO_PXFRAME * THROW_POWER * 5;
      velY = hand.vy * HAND_VEL_TO_PXFRAME * THROW_POWER * 5;
    }

    // 캐릭터 발밑 근처에서 손이 위아래로 방방 튕기는지 감지 → 점프
    const belowAligned = charState === 'idle' && Math.abs(dx) < targetW * 0.7 && dy > targetH * 0.1 && dy < targetH * 3.2;
    if (belowAligned) {
      handYHistory.push({ t, y: hand.smY });
      while (handYHistory.length && t - handYHistory[0].t > 900) handYHistory.shift();
      if (t > jumpCooldownUntil && detectHandBounce(t)) {
        velY = -overlay.height * 0.021;
        jumpCooldownUntil = t + 600;
        handYHistory = [];
        onGround = false;
      }
    } else {
      handYHistory = [];
    }
  } else if (charState === 'grabbed') {
    charState = 'idle'; // 손이 화면에서 사라지면 자동으로 놓임(그 자리에 살포시)
  }

  // ---- 위치/속도 갱신 ----
  if (charState === 'grabbed' && hand) {
    charX += (hand.smX - charX) * 0.6;
    charY += (hand.smY - charY) * 0.6;
    velX = 0; velY = 0;
    onGround = false;
  } else {
    velY += gravity * dt;
    charX += velX * dt;
    charY += velY * dt;

    // 좌우 벽 충돌
    if (charX < targetW / 2) { charX = targetW / 2; velX = Math.abs(velX) * RESTITUTION; }
    if (charX > overlay.width - targetW / 2) { charX = overlay.width - targetW / 2; velX = -Math.abs(velX) * RESTITUTION; }
    // 천장 충돌(너무 세게 던졌을 때 화면 밖으로 사라지지 않도록)
    if (charY < targetH / 2) { charY = targetH / 2; velY = Math.abs(velY) * RESTITUTION; }

    // 바닥 충돌
    if (charY >= floorY) {
      const impactV = Math.abs(velY);
      charY = floorY;
      if (impactV > 1.2) {
        velY = -velY * RESTITUTION;
        landingSquash = Math.min(1, impactV / (overlay.height * 0.045));
      } else {
        velY = 0;
      }
      velX *= GROUND_FRICTION;
      onGround = true;
    } else {
      onGround = false;
      velX *= AIR_DRAG;
    }

    // 바닥에서 속도가 거의 없으면 idle 상태로 스스로 어슬렁거림
    if (onGround && charState === 'idle') {
      if (t > walkChangeAt || walkTargetX === null) {
        walkTargetX = Math.random() * (overlay.width - targetW) + targetW / 2;
        walkChangeAt = t + 2500 + Math.random() * 3000;
      }
      if (Math.hypot(velX, velY) < 1.5) {
        const toTarget = walkTargetX - charX;
        if (Math.abs(toTarget) > targetW * 0.35) {
          velX += Math.sign(toTarget) * 0.14 * dt;
        }
      }
    }
  }

  landingSquash *= 0.82;
  if (Math.abs(velX) > 0.05) facingDir = velX > 0 ? 1 : -1;
}

// 캐릭터를 화면의 실제 물리 위치(charX, charY)에 그림
// - 공중에서는 낙하 속도에 따라 늘어나고, 착지하면 충격만큼 눌리고, 걸을 땐 뒤뚱거림
function drawCharacter(t) {
  const { targetW, targetH } = getCharSize();
  const airborne = !onGround && charState !== 'grabbed';

  let squashY = 1, squashX = 1, tilt = 0;

  if (charState === 'grabbed') {
    tilt = Math.sin(t / 500) * 0.05; // 손에 대롱대롱 들려있는 느낌
  } else if (airborne) {
    const stretch = Math.min(0.4, Math.abs(velY) / (overlay.height * 0.045));
    squashY = 1 + stretch * 0.35;
    squashX = 1 - stretch * 0.22;
    tilt = Math.max(-0.3, Math.min(0.3, velX * 0.012)); // 날아가는 방향으로 살짝 기울어짐
  } else {
    const walking = Math.abs(velX) > 0.3;
    const waddle = walking ? Math.sin(t / 220) : 0;
    squashY = 1 - landingSquash * 0.32 + (walking ? Math.abs(waddle) * 0.05 : 0);
    squashX = 1 + landingSquash * 0.26 - (walking ? Math.abs(waddle) * 0.04 : 0);
    tilt = walking ? waddle * 0.12 : 0;
  }

  ctx.save();
  ctx.shadowColor = charState === 'grabbed' ? getCssVar('--lime') : (airborne ? getCssVar('--magenta') : getCssVar('--cyan'));
  ctx.shadowBlur = airborne ? 32 : 24;
  ctx.globalAlpha = 0.98;

  ctx.translate(charX, charY);
  ctx.rotate(tilt);
  // 그림 자체가 화면 거울반전으로 뒤집혀 보이지 않도록 기본 보정(-1)에
  // 이동 방향(facingDir)을 곱해, 이동/비행 방향을 바라보도록 좌우를 전환
  ctx.scale(-1 * facingDir * squashX, squashY);
  ctx.drawImage(characterImg, -targetW / 2, -targetH / 2, targetW, targetH);
  ctx.restore();

  drawHitEffect(t);
}

// 때렸을 때 손 위치에서 잠깐 퍼지는 충격 링 이펙트
function drawHitEffect(t) {
  if (!hitEffect) return;
  const elapsed = t - hitEffect.t;
  if (elapsed > 400) { hitEffect = null; return; }
  const p = elapsed / 400;
  ctx.save();
  ctx.globalAlpha = 1 - p;
  ctx.strokeStyle = getCssVar('--magenta');
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(hitEffect.x, hitEffect.y, 14 + p * 46, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function getCssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ---------------- 초기화 ----------------
async function init() {
  try {
    statusText.textContent = '모델 불러오는 중';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      handpose.load().then(m => { handModel = m; })
    ]);

    statusText.textContent = '카메라 연결 중';
    await startCamera();

    statusText.textContent = '카메라 대기 중';
    runDetectionLoop();
    requestAnimationFrame(renderLoop);
  } catch (err) {
    console.error(err);
    errorMsg.textContent = (err && err.message) ? err.message : String(err);
    errorBox.classList.add('show');
  }
}

init();
</script>
